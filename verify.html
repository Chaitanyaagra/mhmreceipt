<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- ==========================================================================
     CONTENT SECURITY POLICY
     GitHub Pages cannot set HTTP headers, so this goes in a meta tag — which
     must stay above every script and stylesheet it governs.

     What this buys: an injected <script src="https://evil.example/x.js"> will
     not load, and stolen data cannot be POSTed anywhere except the endpoints
     listed in connect-src. That is the realistic attack against a page that
     handles Aadhaar uploads and payment records.

     What it does NOT buy: script-src still has 'unsafe-inline', because every
     page here is built from inline module scripts and inline style attributes. Removing that needs the inline scripts moved into their
     own .js files first — worth doing, but it is a refactor, not a patch.

     frame-ancestors is not supported in a meta tag, so this cannot stop the
     site being framed. If you ever move off GitHub Pages, set
     `X-Frame-Options: DENY` (or frame-ancestors 'none') as a real header.

     AFTER DEPLOYING: open the site, press F12, and check the Console for
     "Refused to ..." messages. Any legitimate endpoint this policy blocks will
     announce itself there and just needs adding to the right directive.
     ========================================================================== -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://www.gstatic.com https://accounts.google.com https://apis.google.com https://www.google.com;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  img-src 'self' data: blob: https://firebasestorage.googleapis.com https://*.googleusercontent.com;
  font-src 'self' data: https://fonts.gstatic.com;
  connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://accounts.google.com;
  frame-src https://www.google.com https://accounts.google.com;
  worker-src 'self';
  object-src 'none';
  base-uri 'self';
  form-action 'self';
">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify — MHMRWS</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon-32.png">
<meta name="color-scheme" content="light">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="styles.css">
<style>
  body{ background:var(--gradient-navy); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .vcard{ width:100%; max-width:440px; background:var(--white); border-radius:var(--radius-lg); box-shadow:var(--shadow-pop); padding:40px 32px; text-align:center; }
  .vcard .seal{ margin:0 auto 20px; }
  .vstate-title{ font-size:22px; margin-bottom:6px; }
  .vrow{ display:flex; justify-content:space-between; padding:11px 0; border-bottom:1px solid var(--line); font-size:13.5px; text-align:left; }
  .vrow:last-child{ border-bottom:none; }
  .vrow span:first-child{ color:var(--ink-400); }
  .vrow span:last-child{ font-weight:600; color:var(--navy-950); }
  .brand-foot{ margin-top:22px; font-size:12px; color:var(--ink-400); }
</style>
</head>
<body>

  <div class="vcard" id="card">
    <img id="verifyLogo" alt="MHMRWS seal" width="72" height="72" style="border-radius:50%; margin:0 auto 18px; display:block;">
    <div class="seal seal-lg" id="sealBox">
      <div class="spinner" style="color:var(--navy-800);"></div>
    </div>
    <h1 class="vstate-title" id="stateTitle">Checking receipt…</h1>
    <p class="t-muted" id="stateSub" style="margin-bottom:18px;">Ek pal ruko, hum record verify kar rahe hain.</p>
    <div id="details" style="display:none;"></div>
    <div class="brand-foot">MHMRWS Digital Portal · Official Verification</div>
  </div>

<script type="module">
/* Standalone branding — no Firebase dependency. */
import { LOGO_DATA_URI } from './logo-data.js';
document.getElementById('verifyLogo').src = LOGO_DATA_URI;
</script>

<script type="module">
import { db } from './firebase-config.js';
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
import { escapeHtml, fmtDate, formatINR } from './app-common.js';

/* The QR codes now carry an unguessable token (?r= / ?m=) instead of the
   sequential receipt or member number, so the public records cannot be walked
   from 000001 upwards. The old ?receipt= / ?member= parameters are still
   honoured: receipts and cards printed before the change are already in
   residents' hands and must keep verifying. */
const params = new URLSearchParams(window.location.search);
const receiptKey = params.get('r') || params.get('receipt');
const memberKey  = params.get('m') || params.get('member');

const sealBox = document.getElementById('sealBox');
const stateTitle = document.getElementById('stateTitle');
const stateSub = document.getElementById('stateSub');
const details = document.getElementById('details');

function renderNotFound(reason) {
  sealBox.innerHTML = '<span style="font-size:28px;">✕</span>';
  sealBox.style.color = 'var(--danger)';
  stateTitle.textContent = 'Receipt Not Found';
  stateTitle.style.color = 'var(--danger)';
  stateSub.textContent = reason || 'Yeh receipt number hamare record mein nahi mila. Number dobara jaanch lein.';
}

function renderVerified(data) {
  sealBox.innerHTML = '<span style="font-size:30px;color:var(--success);">✓</span>';
  stateTitle.textContent = 'Verified Receipt';
  stateTitle.style.color = 'var(--success)';
  stateSub.textContent = 'Yeh receipt MHMRWS ke official record se match karti hai.';
  details.style.display = 'block';
  details.innerHTML = `
    <div class="vrow"><span>Receipt No.</span><span class="mono">${escapeHtml(data.receiptNumber)}</span></div>
    <div class="vrow"><span>Resident</span><span>${escapeHtml(data.residentName || '—')}</span></div>
    <div class="vrow"><span>Flat / Tower</span><span>${escapeHtml(data.flatNumber || '—')} / ${escapeHtml(data.tower || '—')}</span></div>
    <div class="vrow"><span>Amount</span><span>${formatINR(data.amount)}</span></div>
    <div class="vrow"><span>Financial Year</span><span>${escapeHtml(data.financialYear || '—')}</span></div>
    <div class="vrow"><span>Date</span><span>${fmtDate(data.verifiedAt)}</span></div>
    <div class="vrow"><span>Status</span><span class="t-success">✓ Verified</span></div>
  `;
}

function renderMember(data) {
  // A card whose member has since been deactivated must read as invalid at
  // the gate, even though the record still exists.
  const active = data.status === 'approved';
  sealBox.innerHTML = active
    ? '<span style="font-size:30px;color:var(--success);">&#10003;</span>'
    : '<span style="font-size:28px;color:var(--danger);">&#10005;</span>';
  stateTitle.textContent = active ? 'Active Member' : 'Membership Not Active';
  stateTitle.style.color = active ? 'var(--success)' : 'var(--danger)';
  stateSub.textContent = active
    ? 'Yeh card MHMRWS ke official record se match karta hai.'
    : 'Yeh membership ab active nahi hai. Office se sampark karein.';
  details.style.display = 'block';
  details.innerHTML = `
    <div class="vrow"><span>Member ID</span><span class="mono">${escapeHtml(data.memberID)}</span></div>
    <div class="vrow"><span>Name</span><span>${escapeHtml(data.name || '—')}</span></div>
    <div class="vrow"><span>Tower / Flat</span><span>${escapeHtml(data.tower || '—')} / ${escapeHtml(data.flatNumber || '—')}</span></div>
    <div class="vrow"><span>Type</span><span>${escapeHtml((data.residentType || '—').replace(/^\w/, c => c.toUpperCase()))}</span></div>
    <div class="vrow"><span>Status</span><span class="${active ? 't-success' : 't-danger'}">${active ? 'Active' : 'Inactive'}</span></div>
  `;
}

(async function run() {
  if (!receiptKey && !memberKey) {
    renderNotFound('Is link mein koi receipt ya member number nahi mila.');
    return;
  }
  try {
    if (memberKey) {
      const snap = await getDoc(doc(db, 'membersPublic', memberKey));
      if (snap.exists()) renderMember(snap.data());
      else renderNotFound('Yeh membership hamare record mein nahi mili.');
      return;
    }
    const snap = await getDoc(doc(db, 'receiptsPublic', receiptKey));
    if (snap.exists()) renderVerified(snap.data());
    else renderNotFound();
  } catch (e) {
    console.error(e);
    renderNotFound('Verification service abhi available nahi hai. Baad mein try karein.');
  }
})();
</script>
</body>
</html>
